name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate hero images (optional)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            python3 scripts/generate_images.py
          else
            echo "GEMINI_API_KEY not set — skipping image generation"
          fi

      - name: Build site content
        run: python3 scripts/build_site.py

      - name: Prepare site files
        run: |
          mkdir -p public
          cp ./*.html public/
          cp -r css public/
          cp -r content public/
          [ -d assets ]      && cp -r assets      public/ || true
          [ -f sitemap.xml ] && cp sitemap.xml    public/ || true
          [ -f robots.txt ]  && cp robots.txt     public/ || true
          [ -f llms.txt ]    && cp llms.txt       public/ || true
          touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
